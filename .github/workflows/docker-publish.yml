name: build and push 
on:
  push:
      branches:
           - main
       

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        
        steps:
            - name: checkout the code 
              uses: actions/checkout@v4     # checked out 

            - name: login to dockerhub
              uses: docker/login-action@v3     #login 
             with:
              username: ${{vars.DOCKERHUB_USERNAME}}       
              password: ${{secrets.DOCKERHUB_TOKEN}}         #crendetials given

            - name: build the image
              if: github.ref == 'refs/heads/main'   #this will only build image if the push is from another branch
              uses: docker/build-push-action@v6
              with:
               context: .
               push: false
               tags: |
                 ${{vars.DOCKERHUB_USERNAME}}/github-actions-practice-2:latest
                 ${{vars.DOCKERHUB_USERNAME}}/github-actions-practice-2:${{github.sha}}
               
            - name: build and push to dockerhub
              if: github.ref == 'refs/heads/main'
              uses: docker/build-push-action@v6           # this will build and push the image to dockerhub when the push is from branch main
              with:
               context: .
               push: true
               tags: |
                 ${{vars.DOCKERHUB_USERNAME}}/github-actions-practice-2:latest
                 ${{vars.DOCKERHUB_USERNAME}}/github-actions-practice-2:${{github.sha}}
                     
            
              
   
